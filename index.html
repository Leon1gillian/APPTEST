<!doctype html>
<html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f766e"><title>Leon PhysioLearn</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="style.css"></head>
<body><div class="app"><header><div><h1>Leon PhysioLearn</h1><p>Anatomie-Lernhilfe für Physiotherapie</p></div><button id="themeBtn">🌙</button></header>

<section id="fav" class="tab"><div id="favList"></div></section></main></div><script src="data.js"></script><script src="app.js"></script></body></html>
