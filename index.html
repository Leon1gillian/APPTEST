<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <title>Leon PhysioLearn</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-orb orb-one"></div>
  <div class="bg-orb orb-two"></div>

  <div class="app">
    <header class="topbar">
      <div>
        <span class="eyebrow">Physiotherapie Anatomie</span>
        <h1>Hallo Leon 👋</h1>
        <p>Lerne dein Skript übersichtlich, ruhig und Schritt für Schritt.</p>
      </div>
      <button id="themeBtn" aria-label="Darkmode umschalten">🌙</button>
    </header>

    <section class="hero">
      <div class="hero-title">
        <div>
          <b>Heute lernen</b>
          <span id="stats">0 Kapitel offen</span>
        </div>
        <span class="hero-badge">📚 Lern-App</span>
      </div>
      <div class="bar"><i id="bar"></i></div>
      <div class="quick-grid">
        <div><strong id="chapterCount">0</strong><span>Kapitel</span></div>
        <div><strong id="cardCount">0</strong><span>Karten</span></div>
        <div><strong id="quizCount">0</strong><span>Fragen</span></div>
      </div>
    </section>

    <nav aria-label="Hauptnavigation">
      <button class="active" data-tab="chapters">📚<span>Kapitel</span></button>
      <button data-tab="cards">🧠<span>Karten</span></button>
      <button data-tab="quiz">❓<span>Abfrage</span></button>
      <button data-tab="fav">⭐<span>Favoriten</span></button>
    </nav>

    <main>
      <section id="chapters" class="tab show">
        <div class="search"><span>🔍</span><input id="search" placeholder="Suche nach Muskel, Gelenk, Begriff..."></div>
        <div id="chapterList"></div>
      </section>

      <section id="cards" class="tab">
        <div class="search"><span>🔍</span><input id="cardSearch" placeholder="Karteikarten suchen..."></div>
        <div id="cardList"></div>
      </section>

      <section id="quiz" class="tab">
        <div class="panel quiz-panel">
          <span class="eyebrow">Aktives Wiederholen</span>
          <h2>Abfrage-Modus</h2>
          <p>Frage ansehen, kurz selbst überlegen und erst danach die Lösung öffnen.</p>
          <button id="newQ">Neue Frage</button>
          <article id="quizBox"></article>
        </div>
      </section>

      <section id="fav" class="tab"><div id="favList"></div></section>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
